name: Deep Deobfuscate Malware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deobfuscate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Đổi sang Python 3.10 để tương thích
    
    - name: Install dependencies (chỉ cần cái cần thiết)
      run: |
        # Chỉ cài đúng những thứ cần, bỏ pycrypto
        pip install base91
    
    - name: Run full deobfuscation
      run: python deobfuscate.py
      continue-on-error: false
    
    - name: Upload all results
      uses: actions/upload-artifact@v4
      with:
        name: deobfuscated-payloads
        path: |
          payload_*.txt
          payload_*.py
          payload_*.bin
          deobfuscation_report.txt
          decoded_*.py
          decoded_*.bin
        retention-days: 7
